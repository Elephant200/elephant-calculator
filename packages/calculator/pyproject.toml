[project]
name = "elephant-calculator"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
  "inputimeout>=1.0.4",
  "mpmath>=1.3.0",
  "numpy>=2.2.0",
  "sympy>=1.13.3",
]

[project.scripts]
elephant-calculator = "elephant_calculator.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
